<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>

    <!-- tailwind css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-800">
    <section class="max-w-md min-h-screen mx-auto py-6 bg-gray-200">
        <header>
            <nav class="flex justify-around items-center">
                <img class="w-16" src="assets/Group.png" alt="">
                <div>
                    <h1 class="text-3xl font-bold">$ <span id="main_balance">45000</span></h1>
                    <p>Available Balance</p>
                </div>
                <button class="btn">Logout</button>
            </nav>

            <!-- section -->
            <section class="mt-10 mx-5">
                <h1 class="text-2xl font-bold mb-2">🔥 Welcome to Payooo!</h1>
                <p class="mb-5">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

                <!-- service grid -->
                <div class="cards grid grid-cols-3 gap-3 ">
                    <!-- add money -->
                    <div id="add_money_box"
                        class="box cursor-pointer shadow-sm border border-gray-300 p-4 text-center rounded-lg">
                        <img class="w-8 mx-auto" src="assets/wallet1.png" alt="">
                        <h3>Add Money</h3>
                    </div>

                    <!-- cashout -->
                    <div id="cash_out_box"
                        class="box cursor-pointer shadow-sm border border-gray-300 p-4 text-center rounded-lg">
                        <img class="w-8 mx-auto" src="assets/send1.png" alt="">
                        <h3>Cashout</h3>
                    </div>

                    <!-- transfer money -->
                    <div class="box cursor-pointer shadow-sm border border-gray-300 p-4 text-center rounded-lg">
                        <img class="w-8 mx-auto" src="assets/money1.png" alt="">
                        <h3>Transfer Money</h3>
                    </div>

                    <!-- get bonus -->
                    <div class="box cursor-pointer shadow-sm border border-gray-300 p-4 text-center rounded-lg">
                        <img class="w-8 mx-auto" src="assets/bonus1.png" alt="">
                        <h3>Get Bonus</h3>
                    </div>

                    <!-- pay bill -->
                    <div class="box cursor-pointer shadow-sm border border-gray-300 p-4 text-center rounded-lg">
                        <img class="w-8 mx-auto" src="assets/purse1.png" alt="">
                        <h3>Pay Bill</h3>
                    </div>

                    <!-- transactions -->
                    <div class="box cursor-pointer shadow-sm border border-gray-300 p-4 text-center rounded-lg">
                        <img class="w-8 mx-auto" src="assets/transaction1.png" alt="">
                        <h3>Transactions</h3>
                    </div>
                </div>

                <!-- add money section -->
                <section id="add_money">
                    <h2 class="mx-2 mt-8 text-2xl font-bold">Add Money</h2>
                    <div class="">
                        <div class="hero-content flex-col lg:flex-row-reverse">

                            <div class="card w-full max-w-sm shrink-0 shadow-2xl">
                                <div class="card-body">
                                    <legend>Select A Bank</legend>
                                    <select class="select rounded-full">
                                        <option disabled selected>Select bank</option>
                                        <option value="bkash">Bkash</option>
                                        <option value="nagad">Nagad</option>
                                        <option value="roket">Roket</option>
                                        <option value="cellfin">Cellfin</option>
                                        <option value="upay">Upay</option>
                                    </select>
                                    <fieldset class="fieldset">
                                        <label>Bank Account Number</label>
                                        <input type="email" class="input rounded-full"
                                            placeholder="Enter 11 digit account number" />
                                        <label>Amount to Add</label>
                                        <input id="amount" type="email" class="input rounded-full"
                                            placeholder="Add Amount to withdraw" />
                                        <label>Pin Number</label>
                                        <input id="pin" type="text" class="input rounded-full"
                                            placeholder="Enter 4 digit pin number" />
                                        <button id="add_money" class="btn text-white bg-[#0874F2] mt-4 rounded-full">Add
                                            Money</button>
                                    </fieldset>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- cashout section -->
                <section id="cashout">
                    <h2 class="mx-2 mt-8 text-2xl font-bold">Cash Out</h2>
                    <div class="">
                        <div class="hero-content flex-col lg:flex-row-reverse">
                            <div class="card w-full max-w-sm shrink-0 shadow-2xl">
                                <div class="card-body">
                                    <fieldset class="fieldset">
                                        <label>Agent Number</label>
                                        <input type="email" class="input rounded-full"
                                            placeholder="Enter 11 digit number" />
                                        <label>Amount</label>
                                        <input id="cashout_amount" type="email" class="input rounded-full"
                                            placeholder="Enter amount to withdraw" />
                                        <label>Pin Number</label>
                                        <input id="cashout_pin" type="text" class="input rounded-full"
                                            placeholder="Enter 4 digit pin number" />
                                        <button id="cashout_btn"
                                            class="btn text-white bg-[#0874F2] mt-4 rounded-full">Withdraw
                                            Money</button>
                                    </fieldset>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

        </header>
    </section>

    <script src="script/addMoney.js"></script>
    <script src="script/toggle.js"></script>
    <script src="script/cashout.js"></script>

</body>

</html>
